name: Build and Deploy to AKS

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry acrakslearnjayanth \
            --image booktracker:${{ github.sha }} \
            .
        working-directory: ./app

      - uses: azure/aks-set-context@v4
        with:
          resource-group: rg-aks-learn
          cluster-name: aks-learn

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/booktracker \
            booktracker=acrakslearnjayanth.azurecr.io/booktracker:${{ github.sha }}
          kubectl rollout status deployment/booktracker --timeout=120s
